"12" class="d-node--mint"/><text x="80" y="384" class="d-label" text-anchor="start">engagement → financial health</text><text x="540" y="220" class="d-title" text-anchor="start">WHAT STAYS HUMAN</text><rect x="540" y="244" width="360" height="100" rx="12" class="d-node--red"/><path d="M 571.0 276.0 v -7.0 a 9.0 9.0 0 0 1 18.0 0 v 7.0" class="d-padlock" fill="none"/><rect x="565.0" y="276.0" width="30.0" height="24.0" rx="5" class="d-padlock"/><text x="620" y="270" class="d-label" text-anchor="start"><tspan x="620" dy="0">a human always signs the loan</tspan><tspan x="620" dy="22">— never the AI</tspan><tspan x="620" dy="22">+ the empathy / restructure call</tspan></text><text x="540" y="372" class="d-cap" text-anchor="start">AI sizes · warns · orchestrates — never auto-grants</text><text x="940" y="220" class="d-title" text-anchor="start">THE ASK</text><rect x="940" y="244" width="180" height="130" rx="12" class="d-node--amber"/><text x="956" y="272" class="d-sub" text-anchor="start"><tspan x="956" dy="0">raise (ILLUSTRATIVE)</tspan><tspan x="956" dy="22">to clear 3 gates:</tspan><tspan x="956" dy="22">WTP · real-cohort</tspan><tspan x="956" dy="22">lift · Concurso</tspan></text><text x="60" y="432" class="d-cap" text-anchor="start">We win when you borrow less — judge the honesty, fund the gates. #1 weakness = WTP.</text>
