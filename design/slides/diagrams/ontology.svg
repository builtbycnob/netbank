<svg viewBox="0 0 960 520" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
<rect x="40" y="60" width="880" height="120" rx="12" class="d-band"/><text x="56" y="86" class="d-title" text-anchor="start">WHAT WE STORE</text><rect x="40" y="220" width="880" height="120" rx="12" class="d-band"/><text x="56" y="246" class="d-title" text-anchor="start">THE BRAINS</text><rect x="40" y="360" width="880" height="120" rx="12" class="d-band"/><text x="56" y="386" class="d-title" text-anchor="start">WHAT IT DOES</text><rect x="70" y="96" width="112" height="56" rx="12" class="d-node"/><text x="126.0" y="130.0" class="d-sub" text-anchor="middle">Customer</text><rect x="192" y="96" width="112" height="56" rx="12" class="d-node"/><text x="248.0" y="130.0" class="d-sub" text-anchor="middle">Account</text><rect x="314" y="96" width="112" height="56" rx="12" class="d-node"/><text x="370.0" y="130.0" class="d-sub" text-anchor="middle">Invoice</text><rect x="436" y="96" width="112" height="56" rx="12" class="d-node--payer"/><text x="492.0" y="130.0" class="d-sub" text-anchor="middle">Payer</text><rect x="558" y="96" width="112" height="56" rx="12" class="d-node"/><text x="614.0" y="130.0" class="d-sub" text-anchor="middle">Goal</text><rect x="680" y="96" width="112" height="56" rx="12" class="d-node"/><text x="736.0" y="130.0" class="d-sub" text-anchor="middle">Loan</text><rect x="802" y="96" width="112" height="56" rx="12" class="d-node"/><text x="858.0" y="130.0" class="d-sub" text-anchor="middle">Decision</text><text x="492" y="174" class="d-cap" text-anchor="middle">the join</text><rect x="70" y="256" width="136" height="52" rx="12" class="d-node--blue"/><text x="138.0" y="288.0" class="d-sub" text-anchor="middle">predict late-pay</text><rect x="220" y="256" width="136" height="52" rx="12" class="d-node--blue"/><text x="288.0" y="288.0" class="d-sub" text-anchor="middle">forecast cash</text><rect x="370" y="256" width="136" height="52" rx="12" class="d-node--blue"/><text x="438.0" y="288.0" class="d-sub" text-anchor="middle">safe-to-borrow</text><rect x="540" y="256" width="360" height="52" rx="12" class="d-node--red"/><text x="720.0" y="288.0" class="d-sub" text-anchor="middle">a human signs every loan — by law</text><rect x="70" y="396" width="830" height="52" rx="12" class="d-node"/><text x="485.0" y="428.0" class="d-sub" text-anchor="middle">9 agents: intake → reliability → grant → servicing → repay</text><line x1="465" y1="50" x2="465" y2="446" class="d-divider"/><text x="474" y="64" class="d-cap" text-anchor="start">a boundary</text><text x="120" y="500" class="d-cap" text-anchor="start">separate boxes = the model can&#x27;t cheat, and we stay legal</text>
